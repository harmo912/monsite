<!DOCTYPE html><html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Harmo912 - Site</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      background: #000;
      overflow-x: hidden;
    }.background-effect {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  background: radial-gradient(circle, #0072ff 0%, #000000 100%);
  overflow: hidden;
}

.center-text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 40px; /* Réduction de la taille */
  font-weight: bold;
  color: rgba(255, 255, 255, 0.3); /* Opacité réduite */
}

/* Animation cercles */
.circle {
  position: absolute;
  border: 2px solid #fff;
  border-radius: 50%;
  animation: pulse 5s infinite;
  opacity: 0.7;
}

.circle:nth-child(1) {
  width: 300px;
  height: 300px;
  top: 20%;
  left: 10%;
}

.circle:nth-child(2) {
  width: 500px;
  height: 500px;
  top: 40%;
  left: 70%;
}

@keyframes pulse {
  0% { transform: scale(1); opacity: 0.7; }
  50% { transform: scale(1.2); opacity: 0.3; }
  100% { transform: scale(1); opacity: 0.7; }
}

/* Layout général */
.container {
  display: flex;
  min-height: 100vh;
  position: relative;
  z-index: 1;
}

.sidebar {
  width: 220px;
  background-color: rgba(0, 114, 255, 0.2);
  padding: 20px;
}

.sidebar h2 {
  text-align: center;
  margin-bottom: 20px;
}

.sidebar ul {
  list-style: none;
  padding: 0;
}

.sidebar ul li {
  margin: 15px 0;
}

.sidebar ul li a {
  color: white;
  text-decoration: none;
  font-weight: bold;
  transition: 0.3s;
}

.sidebar ul li a:hover {
  color: #0072ff;
}

.content {
  flex: 1;
  padding: 20px;
  position: relative;
}

header h1 {
  font-size: 36px;
  margin-bottom: 20px;
}

.intro {
  text-align: center;
  margin-bottom: 50px;
}

.spinner {
  margin: 0 auto 20px;
  border: 8px solid rgba(255, 255, 255, 0.1);
  border-top: 8px solid #0072ff;
  border-radius: 50%;
  width: 60px;
  height: 60px;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

.button-container {
  text-align: center;
}

.button-container a {
  display: inline-block;
  margin: 10px;
  padding: 10px 20px;
  background: #0072ff;
  border: none;
  border-radius: 25px;
  color: white;
  text-decoration: none;
  font-size: 16px;
  transition: background 0.3s;
}

.button-container a:hover {
  background: #0055cc;
}

footer {
  text-align: center;
  margin-top: 50px;
  font-size: 14px;
  opacity: 0.7;
}
.page{
border: 1px transparent;
background-color: black;
padding: 6px;
border-radius: 15px;
color: white;
font-weight: bold;
text-family: justify;
}

  </style>
</head>

      </ul>
